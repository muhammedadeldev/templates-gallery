<!DOCTYPE html>
<html>

  <head>

    <!--[if lt IE 9]>
        <script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script><![endif]-->
    <title>ExMass - Coming Soon Template</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="author" content="Amin Diary - Aka: LeAmino">
    <meta name="keywords" content="Creative,404,zombie,animated,animation,css3">
    <meta name="robots" content="all">
    <link data-noprefix  href='http://fonts.googleapis.com/css?family=Dosis:300,400,500,600,700,800' rel='stylesheet' type='text/css'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/animate.css">

    <link rel="stylesheet" href="css/stylesheet.css">
    <script type="text/javascript" src="js/prefixfree.min.js"></script>
    <script type="text/javascript" src="js/pace.min.js"></script>


  </head>

  <body class="style1">

    <div id="preloader">
      <div id="status">&nbsp;</div>
      <noscript>JavaScript is off. Please enable to view full site.</noscript>
    </div>

    <div class="wrapper" >
      <div id="bg-glow" ></div>
      <div id="glows-up" ></div>
      <div id="glows-down" ></div>
      
      <div class="page-holder">
        
		<h1 class="wow bounceIn" data-wow-delay="2s">xMass is coming!</h1>
		<h3 class="subtitle wow bounceIn" data-wow-delay="2.2s">Stay tuned for news and updates.</h3>

		<!-- Countdown dashboard start -->
		<div id="countdown_dashboard" class="wow bounceIn" data-wow-delay="2.4s">
			<div class="dash weeks_dash">
				<span class="dash_title">weeks</span>
				<div class="digit">0</div>
				<div class="digit">0</div>
			</div>

			<div class="dash days_dash">
				<span class="dash_title">days</span>
				<div class="digit">0</div>
				<div class="digit">0</div>
			</div>

			<div class="dash hours_dash">
				<span class="dash_title">hours</span>
				<div class="digit">0</div>
				<div class="digit">0</div>
			</div>

			<div class="dash minutes_dash">
				<span class="dash_title">minutes</span>
				<div class="digit">0</div>
				<div class="digit">0</div>
			</div>

			<div class="dash seconds_dash">
				<span class="dash_title">seconds</span>
				<div class="digit">0</div>
				<div class="digit">0</div>
			</div>

		</div>
		<!-- Countdown dashboard end -->
  
  
	

		<div class="form-holder subscribe wow bounceIn" data-wow-delay="2.6s">
    <div class="message-box"></div>
          <form >

            <div class="form-group">
              <div class="input-group">

                <input class="le-input required email" name="email" data-placeholder="Email" type="text">
                <div class="input-group-addon"><button class="le-btn">Sign Up</button></div>
              </div>
            </div>

          </form>
          <div id="loading" class="pull-right">
            <img alt="" src="images/loader.gif" />
          </div>

		</div>

  
  
  
  
   </div>
      <div id="lights1" ></div>
      <div id="lights2" ></div>
      <div id="lights3" ></div>
      </div>
   

    <a class="goto-top" href="#gotop"></a>

    <script src="js/jquery-1.11.1.min.js"></script>
    <script src="js/jquery-migrate-1.2.1.min.js"></script>

    <script type="text/javascript" src="js/css_browser_selector.js"></script>
  
    <script type="text/javascript" src="js/jquery.validate.js"></script>
    <script type="text/javascript" src="js/plax.js"></script>
    <script type="text/javascript" src="js/jquery.lwtCountdown-1.0.js"></script>
    <script type="text/javascript" src="js/wow.min.js"></script>
    <script type="text/javascript" src="js/fontsmoothie.min.js"></script>
    <script type="text/javascript" src="js/script.js"></script>

  </body>


</html>
