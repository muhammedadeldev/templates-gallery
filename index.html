<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض القوالب</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --accent: #6366f1;
    --accent-2: #22d3ee;
    --text: #e5e7eb;
    --muted: #9ca3af;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: radial-gradient(circle at top, #1a1d27, #0f1117 70%);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  header h1 {
    font-size: 2.2rem;
    margin: 0 0 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p {
    color: var(--muted);
    margin: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid #2a2e3a;
    border-radius: 16px;
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    transition: transform .2s, box-shadow .2s, border-color .2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 10px 25px rgba(99,102,241,.25);
  }
  .card-icon { font-size: 1.8rem; }
  .card-title { font-size: 1.1rem; font-weight: 600; }
  .card-link { font-size: .8rem; color: var(--muted); direction: ltr; }
  .empty {
    text-align: center;
    color: var(--muted);
    grid-column: 1 / -1;
  }
  footer {
    text-align: center;
    margin-top: 50px;
    color: var(--muted);
    font-size: .8rem;
  }
</style>
</head>
<body>
  <header>
    <h1>معرض القوالب 🎨</h1>
    <p>عدد القوالب الحالية: 2 — آخر تحديث: 2026-06-22 10:13 UTC</p>
  </header>
  <div class="grid">
    
        <a class="card" href="templates/example-template-1/index.html" target="_blank" rel="noopener">
          <div class="card-icon">📄</div>
          <div class="card-title">Example Template 1</div>
          <div class="card-link">templates/example-template-1/index.html</div>
        </a>

        <a class="card" href="templates/example-template-2/index.html" target="_blank" rel="noopener">
          <div class="card-icon">📄</div>
          <div class="card-title">Example Template 2</div>
          <div class="card-link">templates/example-template-2/index.html</div>
        </a>
  </div>
  <footer>تم التوليد تلقائيًا عبر GitHub Actions</footer>
</body>
</html>
